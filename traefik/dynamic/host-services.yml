http:
  routers:
    homeassistant:
      rule: Host(`home.antonlabs.cc`) || Host(`homeassistant.antonlabs.cc`)
      service: homeassistant
    qbittorrent:
      rule: Host(`qbit.antonlabs.cc`) || Host(`torrent.antonlabs.cc`)
      service: qbittorrent
    openclaw:
      rule: Host(`openclaw.antonlabs.cc`) || Host(`ngonidzashes-mac-mini.tailafe874.ts.net`)
      service: openclaw
    deploy-realtime:
      rule: Host(`deploy.antonlabs.cc`) && PathPrefix(`/app`)
      priority: 100
      service: coolify-realtime
    deploy-terminal:
      rule: Host(`deploy.antonlabs.cc`) && PathPrefix(`/terminal/ws`)
      priority: 100
      service: coolify-terminal
    deploy:
      rule: Host(`deploy.antonlabs.cc`)
      service: coolify-dashboard
    heimdall-mcp:
      rule: Host(`heimdall.antonlabs.cc`) && (PathPrefix(`/mcp`) || PathPrefix(`/oauth`) || PathPrefix(`/.well-known/oauth`))
      priority: 100
      service: heimdall-mcp
    heimdall:
      rule: Host(`heimdall.antonlabs.cc`)
      service: heimdall

  services:
    homeassistant:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8123
    qbittorrent:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8080
    openclaw:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:18789
    coolify-dashboard:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8000
    coolify-realtime:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:6001
    coolify-terminal:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:6002
    heimdall:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:18882
    heimdall-mcp:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:45637

tls:
  certificates:
    - certFile: /tailscale-certs/ngonidzashes-mac-mini.tailafe874.ts.net.crt
      keyFile: /tailscale-certs/ngonidzashes-mac-mini.tailafe874.ts.net.key

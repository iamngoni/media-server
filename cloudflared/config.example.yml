# Copy this file to config.yml and replace the placeholders locally.
# config.yml and tunnel credential files are intentionally ignored by Git.
tunnel: YOUR_TUNNEL_UUID
credentials-file: /etc/cloudflared/YOUR_TUNNEL_UUID.json

ingress:
  # Expose only explicitly public hostnames. Never use a wildcard here.
  - hostname: public-app.example.com
    service: https://traefik:443
    originRequest:
      originServerName: public-app.example.com
  - service: http_status:404

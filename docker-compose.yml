name: ${COMPOSE_PROJECT_NAME:-media-server}

x-common-service: &common-service
  restart: unless-stopped

x-linuxserver-environment: &linuxserver-environment
  PUID: ${PUID:-1000}
  PGID: ${PGID:-1000}
  TZ: ${TZ:-Etc/UTC}

services:
  jellyfin:
    <<: *common-service
    image: lscr.io/linuxserver/jellyfin:latest
    environment: *linuxserver-environment
    volumes:
      - ${CONFIG_DIR:-./data}/jellyfin:/config
      - ${MEDIA_DIR:-./media}:/media
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
    ulimits:
      nofile:
        soft: 65536
        hard: 1048576

  seerr:
    <<: *common-service
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - ${CONFIG_DIR:-./data}/seerr:/app/config
    ports:
      - "${SEERR_PORT:-5055}:5055"
    depends_on:
      - jellyfin
      - sonarr
      - radarr

  qbittorrent:
    <<: *common-service
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      <<: *linuxserver-environment
      WEBUI_PORT: "8080"
      TORRENTING_PORT: "6881"
    volumes:
      - ${CONFIG_DIR:-./data}/qbittorrent:/config
      - ${DOWNLOADS_DIR:-./downloads}:/downloads
    ports:
      - "${QBITTORRENT_PORT:-8080}:8080"
      - "${TORRENT_PORT:-6881}:6881"
      - "${TORRENT_PORT:-6881}:6881/udp"

  prowlarr:
    <<: *common-service
    image: lscr.io/linuxserver/prowlarr:latest
    environment: *linuxserver-environment
    volumes:
      - ${CONFIG_DIR:-./data}/prowlarr:/config
    ports:
      - "${PROWLARR_PORT:-9696}:9696"

  flaresolverr:
    <<: *common-service
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      TZ: ${TZ:-Etc/UTC}
      LOG_LEVEL: ${FLARESOLVERR_LOG_LEVEL:-info}
    ports:
      - "${FLARESOLVERR_PORT:-8191}:8191"

  sonarr:
    <<: *common-service
    image: lscr.io/linuxserver/sonarr:latest
    environment: *linuxserver-environment
    volumes:
      - ${CONFIG_DIR:-./data}/sonarr:/config
      - ${DOWNLOADS_DIR:-./downloads}:/downloads
      - ${MEDIA_DIR:-./media}/Series:/tv
      - ${MEDIA_DIR:-./media}/Anime:/anime
    ports:
      - "${SONARR_PORT:-8989}:8989"
    depends_on:
      - qbittorrent

  radarr:
    <<: *common-service
    image: lscr.io/linuxserver/radarr:latest
    environment: *linuxserver-environment
    volumes:
      - ${CONFIG_DIR:-./data}/radarr:/config
      - ${DOWNLOADS_DIR:-./downloads}:/downloads
      - ${MEDIA_DIR:-./media}/Movies:/movies
    ports:
      - "${RADARR_PORT:-7878}:7878"
    depends_on:
      - qbittorrent

  lidarr:
    <<: *common-service
    image: lscr.io/linuxserver/lidarr:latest
    environment: *linuxserver-environment
    volumes:
      - ${CONFIG_DIR:-./data}/lidarr:/config
      - ${DOWNLOADS_DIR:-./downloads}:/downloads
      - ${MEDIA_DIR:-./media}/Music:/music
    ports:
      - "${LIDARR_PORT:-8686}:8686"
    depends_on:
      - qbittorrent

  bazarr:
    <<: *common-service
    image: lscr.io/linuxserver/bazarr:latest
    environment: *linuxserver-environment
    volumes:
      - ${CONFIG_DIR:-./data}/bazarr:/config
      - ${MEDIA_DIR:-./media}/Movies:/movies
      - ${MEDIA_DIR:-./media}/Series:/tv
    ports:
      - "${BAZARR_PORT:-6767}:6767"
    depends_on:
      - sonarr
      - radarr

  metube:
    <<: *common-service
    image: ghcr.io/alexta69/metube:latest
    profiles: [extras]
    environment:
      UID: ${PUID:-1000}
      GID: ${PGID:-1000}
    volumes:
      - ${DOWNLOADS_DIR:-./downloads}/metube:/downloads
    ports:
      - "${METUBE_PORT:-8081}:8081"

  jdownloader:
    <<: *common-service
    image: jlesage/jdownloader-2:latest
    profiles: [extras]
    environment:
      USER_ID: ${PUID:-1000}
      GROUP_ID: ${PGID:-1000}
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - ${CONFIG_DIR:-./data}/jdownloader:/config
      - ${DOWNLOADS_DIR:-./downloads}/jdownloader:/output
    ports:
      - "${JDOWNLOADER_PORT:-5800}:5800"

  uptime-kuma:
    <<: *common-service
    image: louislam/uptime-kuma:1
    profiles: [extras]
    volumes:
      - ${CONFIG_DIR:-./data}/uptime-kuma:/app/data
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:3001"

  speedtest-tracker:
    <<: *common-service
    image: lscr.io/linuxserver/speedtest-tracker:latest
    profiles: [extras]
    environment:
      <<: *linuxserver-environment
      APP_KEY: ${SPEEDTEST_APP_KEY:-}
      DB_CONNECTION: sqlite
      SPEEDTEST_SCHEDULE: "${SPEEDTEST_SCHEDULE:-0 */6 * * *}"
    volumes:
      - ${CONFIG_DIR:-./data}/speedtest-tracker:/config
    ports:
      - "${SPEEDTEST_PORT:-8765}:80"

  homeassistant:
    <<: *common-service
    image: ghcr.io/home-assistant/home-assistant:stable
    profiles: [extras]
    environment:
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - ${CONFIG_DIR:-./data}/homeassistant:/config
    ports:
      - "${HOME_ASSISTANT_PORT:-8123}:8123"

  unpackerr:
    <<: *common-service
    image: golift/unpackerr:latest
    profiles: [automation]
    environment:
      TZ: ${TZ:-Etc/UTC}
      UN_SONARR_0_URL: http://sonarr:8989
      UN_SONARR_0_API_KEY: ${UN_SONARR_API_KEY:-}
      UN_RADARR_0_URL: http://radarr:7878
      UN_RADARR_0_API_KEY: ${UN_RADARR_API_KEY:-}
      UN_LIDARR_0_URL: http://lidarr:8686
      UN_LIDARR_0_API_KEY: ${UN_LIDARR_API_KEY:-}
    volumes:
      - ${DOWNLOADS_DIR:-./downloads}:/downloads
    depends_on:
      - sonarr
      - radarr
      - lidarr

  recyclarr:
    <<: *common-service
    image: ghcr.io/recyclarr/recyclarr:latest
    profiles: [automation]
    environment:
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - ${CONFIG_DIR:-./data}/recyclarr:/config

  notifiarr:
    <<: *common-service
    image: golift/notifiarr:latest
    profiles: [automation]
    environment:
      TZ: ${TZ:-Etc/UTC}
      DN_API_KEY: ${NOTIFIARR_API_KEY:-}
    volumes:
      - ${CONFIG_DIR:-./data}/notifiarr:/config
    ports:
      - "${NOTIFIARR_PORT:-5454}:5454"

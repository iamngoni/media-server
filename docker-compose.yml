services:
  # ── Reverse Proxy ──────────────────────────────────────
  traefik:
    image: traefik:v3.6
    container_name: traefik
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - 80:80
      - 8280:8080 # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # ── Media Server ───────────────────────────────────────
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./jellyfin/config:/config
      - ${MEDIA_DIR}:/mnt/media
      - ${MEDIA_DIR}/Movies:${MEDIA_DIR}/Movies
      - ${MEDIA_DIR}/Series:${MEDIA_DIR}/Series
      - ${MEDIA_DIR}/Anime:${MEDIA_DIR}/Anime
      - ${MEDIA_DIR}/Animations:${MEDIA_DIR}/Animations
      - ${MEDIA_DIR}/Music:${MEDIA_DIR}/Music
    ports:
      - 8096:8096
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyfin.rule=Host(`jellyfin.homelab.local`)
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096
    restart: unless-stopped

  jellyseerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: jellyseerr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./jellyseerr/config:/app/config
    ports:
      - 5055:5055
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.homelab.local`)
      - traefik.http.services.jellyseerr.loadbalancer.server.port=5055
    restart: unless-stopped

  # ── Download Stack ─────────────────────────────────────
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent/config:/config
      - ./downloads:/downloads
    restart: unless-stopped

  metube:
    image: ghcr.io/alexta69/metube
    container_name: metube
    environment:
      - UID=${PUID}
      - GID=${PGID}
    volumes:
      - ${DOWNLOADS_DIR}:/downloads
    ports:
      - 8081:8081
    restart: unless-stopped

  jdownloader:
    image: jlesage/jdownloader-2
    container_name: jdownloader
    environment:
      - USER_ID=${PUID}
      - GROUP_ID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./jdownloader/config:/config
      - ${DOWNLOADS_DIR}:/output
    ports:
      - 5800:5800 # Web UI
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./prowlarr/config:/config
    ports:
      - 9696:9696
    labels:
      - traefik.enable=true
      - traefik.http.routers.prowlarr.rule=Host(`prowlarr.homelab.local`)
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
    ports:
      - 8191:8191
    restart: unless-stopped

  # ── Media Management (Arr Stack) ──────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./sonarr/config:/config
      - ./downloads:/downloads
      - ${MEDIA_DIR}/Series:/tv
      - ${MEDIA_DIR}/Anime:/anime
    ports:
      - 8989:8989
    depends_on:
      - qbittorrent
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr.rule=Host(`sonarr.homelab.local`)
      - traefik.http.services.sonarr.loadbalancer.server.port=8989
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./radarr/config:/config
      - ./downloads:/downloads
      - ${MEDIA_DIR}/Movies:/movies
    ports:
      - 7878:7878
    depends_on:
      - qbittorrent
    labels:
      - traefik.enable=true
      - traefik.http.routers.radarr.rule=Host(`radarr.homelab.local`)
      - traefik.http.services.radarr.loadbalancer.server.port=7878
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./lidarr/config:/config
      - ./downloads:/downloads
      - ${MEDIA_DIR}/Music:/music
    ports:
      - 8686:8686
    depends_on:
      - qbittorrent
    labels:
      - traefik.enable=true
      - traefik.http.routers.lidarr.rule=Host(`lidarr.homelab.local`)
      - traefik.http.services.lidarr.loadbalancer.server.port=8686
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./bazarr/config:/config
      - ./downloads:/downloads
      - ${MEDIA_DIR}/Movies:/movies
      - ${MEDIA_DIR}/Series:/tv
    ports:
      - 6767:6767
    depends_on:
      - radarr
    labels:
      - traefik.enable=true
      - traefik.http.routers.bazarr.rule=Host(`bazarr.homelab.local`)
      - traefik.http.services.bazarr.loadbalancer.server.port=6767
    restart: unless-stopped

  # ── Transcoding ─────────────────────────────────────────
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    environment:
      - TZ=${TZ}
    volumes:
      - ./recyclarr/config:/config
    restart: unless-stopped

  unpackerr:
    image: golift/unpackerr:latest
    container_name: unpackerr
    environment:
      - TZ=${TZ}
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${UN_SONARR_API_KEY}
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${UN_RADARR_API_KEY}
      - UN_LIDARR_0_URL=http://lidarr:8686
      - UN_LIDARR_0_API_KEY=${UN_LIDARR_API_KEY}
    volumes:
      - ./downloads:/downloads
    restart: unless-stopped

  notifiarr:
    image: golift/notifiarr:latest
    container_name: notifiarr
    environment:
      - TZ=${TZ}
      - DN_API_KEY=${NOTIFIARR_API_KEY}
    volumes:
      - ./notifiarr/config:/config
      - /var/run/utmp:/var/run/utmp
    ports:
      - 5454:5454
    labels:
      - traefik.enable=true
      - traefik.http.routers.notifiarr.rule=Host(`notifiarr.homelab.local`)
      - traefik.http.services.notifiarr.loadbalancer.server.port=5454
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    environment:
      - TZ=${TZ}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # ── Smart Home ─────────────────────────────────────────
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    environment:
      - TZ=${TZ}
    volumes:
      - ./homeassistant/config:/config
    network_mode: host
    restart: unless-stopped

  # ── Monitoring ─────────────────────────────────────────
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - APP_KEY=${SPEEDTEST_APP_KEY}
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE=0 */3 * * *
    volumes:
      - ./speedtest-tracker/config:/config
    ports:
      - 8765:80
    labels:
      - traefik.enable=true
      - traefik.http.routers.speedtest.rule=Host(`speedtest.homelab.local`)
      - traefik.http.services.speedtest.loadbalancer.server.port=80
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    volumes:
      - ./uptime-kuma/data:/app/data
    ports:
      - 3001:3001
    restart: unless-stopped

  # ── Transcoding ────────────────────────────────────────
  kompressor:
    build: ${KOMPRESSOR_DIR:-../kompressor}
    image: kompressor:latest
    container_name: kompressor
    ports:
      - 8078:8078
    volumes:
      - ${KOMPRESSOR_DATA_DIR:-./kompressor/data}:/app/data
      - ${KOMPRESSOR_TEMP_DIR:-./kompressor/temp}:/app/temp
      - ${MEDIA_DIR}/Movies:/media/Movies
      - ${MEDIA_DIR}/Series:/media/Series
      - ${MEDIA_DIR}/Anime:/media/Anime
      - ${KOMPRESSOR_CONFIG:-../kompressor/config.docker.toml}:/app/config.toml:ro
      - ${KOMPRESSOR_TEMPLATES:-../kompressor/templates}:/app/templates:ro
    environment:
      - RUST_LOG=${KOMPRESSOR_LOG_LEVEL:-info}
    restart: unless-stopped

  # ── Homelab Dashboard ──────────────────────────────────
  nexus:
    build: ${NEXUS_DIR:-../nexus}
    image: nexus:latest
    container_name: nexus
    env_file:
      - path: ${NEXUS_ENV_FILE:-../nexus/.env}
        required: false
    environment:
      - TZ=${TZ}
      - RUST_LOG=${NEXUS_LOG_LEVEL:-info}
      - HOST_IP=${NEXUS_HOST_IP:-localhost}
      - PORT=${NEXUS_PORT:-3000}
      - WEATHER_LOCATION=${NEXUS_WEATHER_LOCATION:-Sandton}
      - QBIT_URL=${NEXUS_QBIT_URL:-http://host.docker.internal:8080}
      - JELLYFIN_URL=${NEXUS_JELLYFIN_URL:-http://host.docker.internal:8096}
      - SONARR_URL=${NEXUS_SONARR_URL:-http://host.docker.internal:8989}
      - RADARR_URL=${NEXUS_RADARR_URL:-http://host.docker.internal:7878}
      - SPEEDTEST_URL=${NEXUS_SPEEDTEST_URL:-http://host.docker.internal:8765}
    volumes:
      - ${MEDIA_DIR}:/mnt/media:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${OPENCLAW_LOG_DIR:-./openclaw/logs}:/root/.openclaw/logs:ro
    ports:
      - ${NEXUS_PORT:-3000}:${NEXUS_PORT:-3000}
    restart: unless-stopped
